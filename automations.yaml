      title: "Night Check \U0001F513"
  - action: script.notify_v3
    data:
      message: '{{ expand(state_attr(''switch.all_switches'', ''entity_id'')) | selectattr(''state'',''eq'',''on'')
        | map(attribute=''name'') | list | count }} switch(es) on: {{ expand(state_attr(''switch.all_switches'',
        ''entity_id'')) | selectattr(''state'',''eq'',''on'') | map(attribute=''name'')
        | list | join('', '') }}'
      title: "Night Check \U0001F50C"
  mode: single
- id: '1780343343606'
  alias: Leak Sensor Notification v3
  description: CRITICAL — Notifies all phones AND announces on Alexa when any water
    leak sensor fires. Bypasses quiet mode and guest mode. Always fires.
  triggers:
  - entity_id:
    - binary_sensor.sump_pump_water_leak
    - binary_sensor.basement_drain_water_leak
    - binary_sensor.master_bathroom_water_leak
    - binary_sensor.kitchen_sink_water_leak
    - binary_sensor.guest_bathroom_water_leak
    platform: state
    to:
    - 'on'
  actions:
  - action: script.notify_critical_v1
    data:
      message: "\U0001F4A7 {{ trigger.to_state.attributes.friendly_name }} is reporting
        a leak at {{ now().strftime('%-I:%M %p') }} — shut off water if needed!"
      title: "\U0001F4A7 {{ trigger.to_state.attributes.friendly_name }} Detected"
  mode: single
- id: '1780343356570'
  alias: Critical Alerts v1
  description: CRITICAL — Smoke and CO detection. Notifies all phones and announces
    on Alexa regardless of quiet mode, guest mode, or any other suppression. Never
    disable this automation.
  triggers:
  - platform: state
    entity_id:
    - binary_sensor.garage_smoke_detector_smoke
    - binary_sensor.network_rack_smoke_detector_smoke
    - binary_sensor.home_smoke_detected
    to: 'on'
    id: smoke
  - platform: numeric_state
    entity_id: sensor.garage_smoke_detector_carbon_monoxide
    above: 0
    id: co
  - platform: state
    entity_id: binary_sensor.home_carbon_monoxide_detected
    to: 'on'
    id: co_binary
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: smoke
      sequence:
      - action: script.notify_critical_v1
        data:
          title: "\U0001F525 {{ trigger.to_state.attributes.friendly_name }}: Smoke"
          message: '{{ trigger.to_state.attributes.friendly_name }} has detected smoke
            at {{ now().strftime(''%-I:%M %p'') }} — evacuate if needed and call 911!'
    - conditions:
      - condition: trigger
        id:
        - co
        - co_binary
      sequence:
      - action: script.notify_critical_v1
        data:
          title: '☠️ {{ trigger.to_state.attributes.friendly_name }}: CO'
          message: Carbon monoxide detected by {{ trigger.to_state.attributes.friendly_name
            }} at {{ now().strftime('%-I:%M %p') }} — evacuate immediately and call
            911!
  mode: parallel
  max: 10
- id: '1780348324573'
  alias: Lights Schedule v1
  description: 'Unified lights schedule. Sunset -10min: turns on entry and exterior
    lights. 10:30pm: turns off first floor and basement. 11:30pm: turns off porch
    light. Sunrise: turns off all remaining outdoor lights.'
  triggers:
  - platform: sun
    event: sunset
    offset: -00:10:00
    id: sunset
  - platform: time
    at: '22:30:00'
    id: night
  - platform: time
    at: '23:30:00'
    id: latenight
  - platform: sun
    event: sunrise
    offset: 00:00:00
    id: sunrise
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: sunset
      sequence:
      - action: light.turn_on
        target:
          entity_id:
          - light.kitchen_light
          - light.driveway_light
          - light.porch_light
          - light.staircase_light
        data: {}
    - conditions:
      - condition: trigger
        id: night
      sequence:
      - action: light.turn_off
        target:
          entity_id:
          - light.first_floor
          - light.basement
        data: {}
    - conditions:
      - condition: trigger
        id: latenight
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.porch_light
        data: {}
    - conditions:
      - condition: trigger
        id: sunrise
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.outdoor
        data: {}
  mode: restart
- id: '1780348561530'
  alias: Shutdown Home Assistant v2
  description: Shuts down the host when UPS battery drops below 25% for 1 minute.
    Sends a critical notification to all phones before shutdown.
  triggers:
  - entity_id:
    - sensor.apc_battery_charge
    for:
      hours: 0
      minutes: 1
      seconds: 0
    below: 25
    platform: numeric_state
  actions:
  - action: script.notify_critical_v1
    data:
      title: "\U0001F50B UPS Battery Critical"
      message: UPS battery is at {{ states('sensor.apc_battery_charge') }}% — CrashPad
        is shutting down now to protect data. {{ now().strftime('%-I:%M %p') }}
  - delay:
      seconds: 10
  - action: hassio.host_shutdown
    data: {}
  mode: single
- id: '1780348574852'
  alias: Power Status v2
  description: Notifies all phones critically when mains power is lost (UPS kicks
    in) or restored. Bypasses quiet mode.
  triggers:
  - entity_id:
    - sensor.tripp_lite_status
    from: Online
    id: poweroff
    platform: state
  - entity_id:
    - sensor.tripp_lite_status
    id: poweron
    platform: state
    to: Online
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: poweroff
      sequence:
      - action: script.notify_v3
        data:
          critical: true
          message: CrashPad has lost mains power and is running on UPS battery. {{
            now().strftime('%-I:%M %p') }}
          title: ⚡ Power Outage
    - conditions:
      - condition: trigger
        id: poweron
      sequence:
      - action: script.notify_v3
        data:
          critical: true
          message: Mains power has been restored. UPS is back online. {{ now().strftime('%-I:%M
            %p') }}
          title: ✅ Power Restored
  mode: single
- id: '1780348587251'
  alias: 3D Printer Control v2
  description: Notifies Sooraj when a 3D print completes, but only if the printer
    switch is actually on.
  triggers:
  - entity_id:
    - sensor.k1se_print_status
    for:
      hours: 0
      minutes: 10
      seconds: 0
    platform: state
    to:
    - completed
  conditions:
  - condition: state
    entity_id: switch.3d_printer
    state: 'on'
  actions:
  - action: notify.send_message
    data:
      message: "Your 3D print has completed! \U0001F5A8️ {{ now().strftime('%-I:%M
        %p') }}"
      title: ✅ 3D Print Complete
    target:
      entity_id: notify.sj
  mode: single
- id: '1780348614726'
  alias: Fireplace Monitoring v2
  description: Notifies all phones whenever the fireplace is turned on or off.
  triggers:
  - entity_id: switch.fireplace_fireplace
    platform: state
    to:
    - 'on'
    - 'off'
  actions:
  - action: script.notify_v3
    data:
      message: Fireplace is {{ trigger.to_state.state | title }} — {{ now().strftime('%-I:%M
        %p') }}
      title: "\U0001F525 Fireplace {{ 'On' if trigger.to_state.state == 'on' else
        'Off' }}"
  mode: single
- id: '1780348630584'
  alias: Check All Door Status v2
  description: Checks every 15 minutes whether the front door or garage door has been
    open continuously for 15+ minutes and sends a notification if so.
  triggers:
  - minutes: /15
    platform: time_pattern
  actions:
  - alias: Alert if front door open 15+ min
    if:
    - condition: state
      entity_id: binary_sensor.front_door
      for:
        hours: 0
        minutes: 15
        seconds: 0
      state: 'on'
    then:
    - action: script.notify_v3
      data:
        message: Front Door has been open for {{ relative_time(states.binary_sensor.front_door.last_changed)
          }} — {{ now().strftime('%-I:%M %p') }}
        title: "\U0001F6AA Front Door Left Open"
  - alias: Alert if garage door open 15+ min
    if:
    - condition: state
      entity_id: binary_sensor.garage_door
      for:
        hours: 0
        minutes: 15
        seconds: 0
      state: 'on'
    then:
    - action: script.notify_v3
      data:
        message: Garage Door has been open for {{ relative_time(states.binary_sensor.garage_door.last_changed)
          }} — {{ now().strftime('%-I:%M %p') }}
        title: "\U0001F3EA Garage Door Left Open"
  mode: single
- id: '1780348642218'
  alias: Lock Front Door v2
  description: Automatically locks the front door 5 minutes after it closes, if it's
    still unlocked.
  triggers:
  - entity_id:
    - binary_sensor.front_door
    for:
      hours: 0
      minutes: 5
      seconds: 0
    from:
    - 'on'
    platform: state
    to:
    - 'off'
  conditions:
  - condition: state
    entity_id: lock.front_door
    state: unlocked
  actions:
  - action: lock.lock
    target:
      entity_id: lock.front_door
  mode: single
- id: '1780348658097'
  alias: House Schedule v1
  description: 'Unified daily schedule at 5:30am and 11:30pm. Morning: powers on the
    office wall panel (PoE) and recirculation pump, turns off bathroom heat lamp.
    Night: reverses all — panel off, pump off, heat lamp on.'
  triggers:
  - at: 05:30:00
    id: morning
    trigger: time
  - at: '23:30:00'
    id: night
    trigger: time
  actions:
  - choose:
    - alias: Morning — power on panel and pump, power off heat lamp
      conditions:
      - condition: trigger
        id: morning
      sequence:
      - action: switch.turn_on
        data: {}
        target:
          entity_id: switch.usw_pro_24_poe_wp_poe
      - action: switch.turn_on
        data: {}
        target:
          entity_id: switch.master_bathroom_outlet_1
      - action: switch.turn_off
        data: {}
        target:
          entity_id: switch.master_bathroom_outlet_2
    - alias: Night — power off panel and pump, power on heat lamp
      conditions:
      - condition: trigger
        id: night
      sequence:
      - action: switch.turn_off
        data: {}
        target:
          entity_id: switch.usw_pro_24_poe_wp_poe
      - action: switch.turn_off
        data: {}
        target:
          entity_id: switch.master_bathroom_outlet_1
      - action: switch.turn_on
        data: {}
        target:
          entity_id: switch.master_bathroom_outlet_2
  mode: single
- id: '1780354029167'
  alias: Auto Disarm Security v3
  description: Automatically unlocks the garage door lock and disarms the alarm when
    Sooraj or Arleepta arrives home.
  triggers:
  - entity_id: person.sooraj_chettada
    event: enter
    platform: zone
    zone: zone.home
  - entity_id: person.arleepta
    event: enter
    platform: zone
    zone: zone.home
  actions:
  - alias: Unlock garage door if locked
    if:
    - condition: state
      entity_id: lock.garage_door_lock
      state: locked
    then:
    - action: lock.unlock
      target:
        entity_id: lock.garage_door_lock
  - alias: Disarm alarm if armed away
    if:
    - condition: state
      entity_id: alarm_control_panel.home
      state: armed_away
    then:
    - action: alarm_control_panel.alarm_disarm
      data:
        code: '1985'
      target:
        entity_id: alarm_control_panel.home
  mode: single
- id: '1780615151101'
  alias: Auto Arm Security v2
  description: Automatically locks the front door and arms the alarm in away mode
    when BOTH Sooraj and Arleepta have been simultaneously away for 5 minutes. Uses
    a combined template trigger so GPS flickers on either person reset the clock correctly.
    Only fires if alarm is currently disarmed.
  triggers:
  - platform: template
    value_template: '{{ is_state(''person.sooraj_chettada'', ''not_home'') and is_state(''person.arleepta'',
      ''not_home'') }}'
    for:
      hours: 0
      minutes: 5
      seconds: 0
  conditions:
  - condition: state
    entity_id: alarm_control_panel.home
    state: disarmed
  actions:
  - action: lock.lock
    target:
      entity_id: lock.garage_door_lock
  - data:
      code: '1985'
      mode: away
      force: true
      skip_delay: true
      entity_id: alarm_control_panel.home
    action: alarmo.arm
  mode: single
- id: '1781411532718'
  alias: Power Status v3
  description: Notifies all phones critically when mains power is lost (UPS on battery)
    or restored. Uses substring matching on the UPS status so restoration is detected
    immediately, even while the UPS reports 'Online, Battery Charging' rather than
    waiting for it to settle to exactly 'Online'. Bypasses quiet mode.
  triggers:
  - id: poweroff
    trigger: template
    value_template: '{{ ''On Battery'' in states(''sensor.tripp_lite_status'') }}'
  - id: poweron
    trigger: template
    value_template: '{{ ''Online'' in states(''sensor.tripp_lite_status'') }}'
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: poweroff
      sequence:
      - action: script.notify_v3
        data:
          critical: true
          title: ⚡ Power Outage
          message: CrashPad has lost mains power and is running on UPS battery. {{
            now().strftime('%-I:%M %p') }}
    - conditions:
      - condition: trigger
        id: poweron
      sequence:
      - action: script.notify_v3
        data:
          critical: true
          title: ✅ Power Restored
          message: Mains power has been restored. {{ now().strftime('%-I:%M %p') }}
  mode: single
