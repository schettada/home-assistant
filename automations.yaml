- id: '1734902479753'
  alias: Basement Lights
  description: 'Controls basement stair and main lights based on the basement door
    and occupancy. Door open: turn on both lights (stair always, basement if not already
    on). Door closed: turn off stair light only if basement is unoccupied. Door open
    15+ min: turn off stair light (person is in basement, no longer needed on stairs).
    No occupancy for 15 min: turn off all basement lights.'
  triggers:
  - entity_id:
    - binary_sensor.basement_door
    from:
    - 'off'
    to:
    - 'on'
    id: open
