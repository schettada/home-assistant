      - action: script.notify_v3
        data:
          message: '{{ trigger.to_state.attributes.friendly_name }} closed at {{ now().strftime(''%-I:%M
            %p'') }}'
          title: "{% set dc = trigger.to_state.attributes.device_class %}{% if dc
            == 'window' %}\U0001FA9F{% elif dc == 'door' %}\U0001F6AA{% else %}\U0001F529{%
            endif %} {{ trigger.to_state.attributes.friendly_name }} Closed"
