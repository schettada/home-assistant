- id: '1661747369154'
  alias: HA Start/Stop
  description: Notifies Sooraj (admin only) when Home Assistant starts or shuts down.
  triggers:
  - event: start
    id: hastart
    platform: homeassistant
  - event: shutdown
    id: hastop
    platform: homeassistant
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hastart
      sequence:
      - delay:
          seconds: 30
      - action: notify.send_message
        target:
          entity_id: notify.sj
        data:
          title: ✅ CrashPad Online
          message: Home Assistant started successfully at {{ now().strftime("%-I:%M
            %p") }} on {{ now().strftime("%A, %B %-d") }}
    - conditions:
      - condition: trigger
        id: hastop
      sequence:
      - action: notify.send_message
        target:
          entity_id: notify.sj
        data:
          title: ⚠️ CrashPad Offline
          message: Home Assistant is shutting down at {{ now().strftime("%-I:%M %p")
            }} on {{ now().strftime("%A, %B %-d") }}
    default: []
  mode: single
