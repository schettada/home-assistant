- id: '1663995445012'
  alias: Alarmo
  description: ''
  triggers:
  - entity_id:
    - alarm_control_panel.home
    to: armed_home
    id: armed_home
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: armed_night
    id: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: armed_away
    id: armed_away
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: disarmed
    id: disarmed
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: arming
    id: arming
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: pending
    id: pending
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: triggered
    id: triggered
    trigger: state
  - event_type: alarmo_failed_to_arm
    id: failed
    trigger: event
  - event_type: alarmo_command_success
    id: success
    trigger: event
  - topic: zigbee2mqtt/keypad
    id: keypad
    trigger: mqtt
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: armed_home
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_day_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: armed_night
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_night_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: armed_away
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_all_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: disarmed
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "disarm"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: arming
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "exit_delay"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: pending
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "entry_delay"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: triggered
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "in_alarm"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: failed
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''invalid_code'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "invalid_code"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''open_sensors'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "not_ready"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''not_allowed'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''disarm'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "already_disarmed"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
    - conditions:
      - condition: trigger
        id: success
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''away'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_all_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''home'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_day_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''night'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_night_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''disarm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "disarm"     } }'
            action: mqtt.publish
    - conditions:
      - condition: trigger
        id: keypad
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "disarm"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.disarm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_all_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: away
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_day_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: home
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_night_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: night
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
  mode: parallel
  max: 10
- id: '1664594503267'
