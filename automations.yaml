    id: turnon
  - platform: state
    entity_id: binary_sensor.pooja_room_motion_sensor_occupancy
    to: 'off'
    for:
      hours: 0
      minutes: 2
      seconds: 0
    id: turnoff
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: turnon
      sequence:
      - action: light.turn_on
        target:
          entity_id: light.pooja_room
        data: {}
    - conditions:
      - condition: trigger
        id: turnoff
      sequence:
      - action: light.turn_off
        target:
          entity_id: light.pooja_room
        data: {}
  mode: restart
- id: '1780343265731'
