- id: '1661747369154'
  alias: HA Start/Stop
  description: Notifies Sooraj (admin only) when Home Assistant starts or shuts down.
  triggers:
  - event: start
    id: hastart
    platform: homeassistant
  - event: shutdown
    id: hastop
    platform: homeassistant
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: hastart
      sequence:
      - delay:
          seconds: 30
      - action: notify.send_message
        target:
          entity_id: notify.sj
        data:
          title: ✅ CrashPad Online
          message: Home Assistant started successfully at {{ now().strftime("%-I:%M
            %p") }} on {{ now().strftime("%A, %B %-d") }}
    - conditions:
      - condition: trigger
        id: hastop
      sequence:
      - action: notify.send_message
        target:
          entity_id: notify.sj
        data:
          title: ⚠️ CrashPad Offline
          message: Home Assistant is shutting down at {{ now().strftime("%-I:%M %p")
            }} on {{ now().strftime("%A, %B %-d") }}
    default: []
  mode: single
- id: '1663995445012'
  alias: Alarmo
  description: ''
  triggers:
  - entity_id:
    - alarm_control_panel.home
    to: armed_home
    id: armed_home
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: armed_night
    id: armed_night
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: armed_away
    id: armed_away
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: disarmed
    id: disarmed
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: arming
    id: arming
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: pending
    id: pending
    trigger: state
  - entity_id:
    - alarm_control_panel.home
    to: triggered
    id: triggered
    trigger: state
  - event_type: alarmo_failed_to_arm
    id: failed
    trigger: event
  - event_type: alarmo_command_success
    id: success
    trigger: event
  - topic: zigbee2mqtt/keypad
    id: keypad
    trigger: mqtt
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: armed_home
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_day_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: armed_night
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_night_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: armed_away
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "arm_all_zones"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: disarmed
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "disarm"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: arming
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "exit_delay"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: pending
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "entry_delay"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: triggered
      sequence:
      - data:
          topic: zigbee2mqtt/keypad/set
          payload: '{     "arm_mode": {         "mode": "in_alarm"     } }'
        action: mqtt.publish
    - conditions:
      - condition: trigger
        id: failed
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''invalid_code'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "invalid_code"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''open_sensors'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "not_ready"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''not_allowed'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.reason == ''disarm'' }}'
          sequence:
          - data:
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id                         }},         "mode":
                "already_disarmed"     } }'
              topic: zigbee2mqtt/keypad/set
            action: mqtt.publish
    - conditions:
      - condition: trigger
        id: success
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''away'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_all_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''home'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_day_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''arm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          - condition: template
            value_template: '{{ trigger.event.data.mode == ''night'' }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "arm_night_zones"     } }'
            action: mqtt.publish
        - conditions:
          - condition: template
            value_template: '{{ trigger.event.data.action == ''disarm'' }}'
          - condition: template
            value_template: '{{ trigger.event.data.context_id != null }}'
          sequence:
          - data:
              topic: zigbee2mqtt/keypad/set
              payload: '{     "arm_mode": {         "transaction": {{ trigger.event.data.context_id
                }},         "mode": "disarm"     } }'
            action: mqtt.publish
    - conditions:
      - condition: trigger
        id: keypad
      sequence:
      - choose:
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "disarm"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.disarm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_all_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: away
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_day_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: home
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
        - conditions:
          - condition: template
            value_template: '{{ trigger.payload_json.action == "arm_night_zones"  }}'
          sequence:
          - data:
              entity_id: alarm_control_panel.home
              mode: night
              code: '{{ trigger.payload_json.action_code }}'
              context_id: '{{ trigger.payload_json.action_transaction }}'
            action: alarmo.arm
  mode: parallel
  max: 10
- id: '1664594503267'
  alias: Auto Arm Security
  description: Automatically locks the front door and arms the alarm in away mode
    when both Sooraj and Arleepta have been away for 5 minutes. Only triggers if alarm
    is currently disarmed.
  triggers:
  - platform: state
    entity_id:
    - person.sooraj_chettada
    - person.arleepta
    to: not_home
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: person_away
  conditions:
  - condition: state
    entity_id: alarm_control_panel.home
    state: disarmed
  - condition: state
    entity_id: person.sooraj_chettada
    state: not_home
  - condition: state
    entity_id: person.arleepta
    state: not_home
  actions:
  - device_id: f6fb94ee1b2f598b481ded658a4af30b
    domain: lock
    entity_id: 191d58b23eef085ccf6f38511077e5cd
    type: lock
  - data:
      code: '1985'
      mode: away
      force: true
      skip_delay: true
      entity_id: alarm_control_panel.home
    action: alarmo.arm
  mode: single
- id: '1677274589664'
  alias: Rack Light On/Off
  description: Toggles the network rack light via its Zigbee button (single press).
    Uses device trigger as this is a Z2M MQTT button with no state entity.
  triggers:
  - domain: mqtt
    device_id: 3b8b80a17913ddb5ed8063e241f17e18
    type: action
    subtype: single
    platform: device
  conditions: []
  actions:
  - data: {}
    target:
      device_id: abb44e139e83eb2414e59654c64ee273
    action: light.toggle
  mode: single
- id: '1734902479753'
  alias: Basement Lights
  description: 'Controls basement stair and main lights based on the basement door
    and occupancy. Door open: turn on both lights (stair always, basement if not already
    on). Door closed: turn off stair light only if basement is unoccupied. Door open
    15+ min: turn off stair light (person is in basement, no longer needed on stairs).
    No occupancy for 15 min: turn off all basement lights.'
  triggers:
  - entity_id:
    - binary_sensor.basement_door
    from:
    - 'off'
    to:
    - 'on'
    id: open
    platform: state
  - entity_id:
    - binary_sensor.basement_door
    from:
    - 'on'
    to:
    - 'off'
    id: close
    platform: state
  - entity_id:
    - binary_sensor.basement_door
    from:
    - 'off'
    to:
    - 'on'
    for:
      hours: 0
      minutes: 15
      seconds: 0
    id: openlong
    platform: state
  - platform: state
    entity_id: binary_sensor.basement_multi_sensor_occupancy
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
    id: noone
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: open
      - condition: state
        entity_id: light.basement_stair_light
        state: 'off'
      sequence:
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id:
          - light.basement_stair_light
      - action: light.turn_on
        metadata: {}
        data: {}
        target:
          entity_id:
          - light.basement_light
    - conditions:
      - condition: trigger
        id: close
      - condition: state
        entity_id: light.basement_stair_light
        state: 'on'
      - condition: state
        entity_id: binary_sensor.basement_multi_sensor_occupancy
        state: 'off'
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.basement_stair_light
    - conditions:
      - condition: trigger
        id: openlong
      - condition: state
        entity_id: light.basement_light
        state: 'on'
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id: light.basement_stair_light
    - conditions:
      - condition: trigger
        id:
        - noone
      sequence:
      - action: light.turn_off
        metadata: {}
        data: {}
        target:
          entity_id:
          - light.basement_light
          - light.basement_stair_light
  mode: restart
- id: '1775093597448'
  alias: Pooja Room Lights
  description: Turns the Pooja Room light on when occupied, off after 2 minutes of
    no occupancy.
  triggers:
  - platform: state
    entity_id: binary_sensor.pooja_room_motion_sensor_occupancy
